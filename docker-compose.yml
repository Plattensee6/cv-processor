version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cv-processor-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cvprocessor}
      POSTGRES_USER: ${POSTGRES_USER:-cvuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cvpass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cvuser} -d ${POSTGRES_DB:-cvprocessor} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cv-processor-network

  ollama:
    image: ollama/ollama:latest
    container_name: cv-processor-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cv-processor-network
    restart: unless-stopped


  cv-processor-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv-processor-app
    environment:
      # Database Configuration
      POSTGRES_DB: ${POSTGRES_DB:-cvprocessor}
      POSTGRES_USER: ${POSTGRES_USER:-cvuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cvpass}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
      
      # Ollama Configuration (local LLM, no API key needed)
      OLLAMA_HOST: ${OLLAMA_HOST:-ollama}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
      
      # Application Configuration
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      FILE_MAX_SIZE: ${FILE_MAX_SIZE:-10MB}
      FILE_ALLOWED_TYPES: ${FILE_ALLOWED_TYPES:-application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
      
      # JVM Configuration
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
      # DEBUG_OPTS: "${DEBUG_OPTS:--agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005}"
      
      # Liquibase Configuration
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_LIQUIBASE_DROP_FIRST: "false"
      SPRING_LIQUIBASE_CONTEXTS: "default"
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${DEBUG_PORT:-5005}:5005"
    depends_on:
      postgres:
        condition: service_healthy
      # Remove ollama dependency for faster parallel startup
      # ollama:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - cv-processor-network
    restart: unless-stopped

  cv-processor-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: cv-processor-web
    environment:
      VITE_PROXY_TARGET: http://cv-processor-app:8080
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      cv-processor-app:
        condition: service_started
    networks:
      - cv-processor-network
    restart: unless-stopped

# Monitoring removed for simplicity - using Spring Actuator only

networks:
  cv-processor-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data: