version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cv-processor-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cvprocessor}
      POSTGRES_USER: ${POSTGRES_USER:-cvuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cvpass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvuser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: