openapi: 3.0.3
info:
  title: CV Processor - Admin Users API
  version: 1.0.0

paths:
  /api/admin/users:
    get:
      summary: List HR admin users
      operationId: listUsers
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
    post:
      summary: Create HR admin user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'

  /api/admin/users/{id}:
    put:
      summary: Update HR admin user
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '404':
          description: User not found

components:
  schemas:
    UserSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        fullName:
          type: string
        enabled:
          type: boolean
        locked:
          type: boolean
        roles:
          type: array
          items:
            type: string

    CreateUserRequest:
      type: object
      required:
        - email
        - fullName
        - password
        - roles
      properties:
        email:
          type: string
          format: email
        fullName:
          type: string
        password:
          type: string
        roles:
          type: array
          items:
            type: string

    UpdateUserRequest:
      type: object
      required:
        - fullName
        - enabled
        - locked
        - roles
      properties:
        fullName:
          type: string
        enabled:
          type: boolean
        locked:
          type: boolean
        roles:
          type: array
          items:
            type: string

