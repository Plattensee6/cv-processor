# Liquibase Configuration Properties
# Database connection settings
driver=org.postgresql.Driver
url=jdbc:postgresql://localhost:5432/cvprocessor
username=cvuser
password=cvpass

# Change log settings
changeLogFile=src/main/resources/db/changelog/db.changelog-master.xml
outputChangeLogFile=src/main/resources/db/changelog/db.changelog-output.xml
diffChangeLogFile=src/main/resources/db/changelog/db.changelog-diff.xml

# Liquibase behavior
dropFirst=false
clearCheckSums=false
validateOnMigrate=true
runOnChange=true

# Logging
logLevel=INFO
