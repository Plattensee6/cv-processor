spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: cv-processor

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cvprocessor}
    username: ${POSTGRES_USER:cvuser}
    password: ${POSTGRES_PASSWORD:cvpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    drop-first: false
    contexts: default
    default-schema: public
    liquibase-schema: public
    database-change-log-table: DATABASECHANGELOG
    database-change-log-lock-table: DATABASECHANGELOGLOCK
    # Additional Liquibase settings for faster startup

security:
  jwt:
    # Dev-only secret; override via SECURITY_JWT_SECRET in production
    secret: ${SECURITY_JWT_SECRET:this_is_a_dev_only_jwt_secret_32_chars_min_for_dev}
    access-token-ttl-seconds: 1800

# Local Model Configuration (Ollama)
ollama:
  host: ${OLLAMA_HOST:localhost}
  port: ${OLLAMA_PORT:11434}
  model: ${OLLAMA_MODEL:llama3.2:1b}
  timeout: ${OLLAMA_TIMEOUT:120}

# File Upload Configuration
file:
  upload:
    max-size: ${FILE_MAX_SIZE:10MB}
    allowed-types: ${FILE_ALLOWED_TYPES:application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}

# Logging Configuration
logging:
  level:
    com.intuitech.cvprocessor: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cv-processor.log
    max-size: 10MB
    max-history: 30

# Management and Monitoring (Spring Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Server Configuration
server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# OpenAPI (Swagger) Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    display-operation-id: true
    show-extensions: true
    show-common-extensions: true
    try-it-out-enabled: true
  show-actuator: true

